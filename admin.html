<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin V2 - Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white font-sans p-4">

    <!-- CONSOLA DE DEBUG (Para que veas qué falla) -->
    <div id="debug-log" class="fixed top-2 right-2 bg-red-900/80 p-2 rounded text-[10px] z-50 opacity-0"></div>

    <!-- BLOQUE 1: LOGIN -->
    <section id="auth-section" class="flex flex-col items-center justify-center min-h-[80vh]">
        <h2 class="text-xl font-bold mb-4">Acceso Admin</h2>
        <input id="email" type="email" placeholder="Email" class="w-full max-w-xs bg-gray-800 p-3 mb-2 rounded">
        <input id="pass" type="password" placeholder="Pass" class="w-full max-w-xs bg-gray-800 p-3 mb-4 rounded">
        <button id="login-btn" class="bg-pink-600 px-8 py-3 rounded-full font-bold">Entrar</button>
    </section>

    <!-- BLOQUE 2: PANEL (Inicialmente oculto) -->
    <section id="panel-section" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Admin Panel</h1>
            <button id="logout-btn" class="bg-gray-700 px-3 py-1 rounded text-xs">Salir</button>
        </div>

        <!-- Módulos reales -->
        <div class="space-y-4">
            <div id="mod-colores" class="p-4 bg-gray-900 rounded-xl border border-gray-700">
                <h3 class="text-pink-500 font-bold mb-2">🎨 Módulo Colores</h3>
                <input type="color" class="w-full h-10 mb-2">
                <button class="w-full bg-pink-700 py-2 rounded">Guardar Color</button>
            </div>
            <!-- Aquí puedes añadir más módulos -->
        </div>
    </section>

    <script>
        const log = (msg) => {
            const d = document.getElementById('debug-log');
            d.innerHTML += msg + '<br>';
            d.style.opacity = '1';
            console.log(msg);
        };

        const supabase = supabase.createClient(
            "https://qmyndbtdrwsrdkjmlgxh.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFteW5kYnRkcndzcmRram1sZ3hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNTM1ODUsImV4cCI6MjA5ODkyOTU4NX0.b_TIFgIyBInmAREViPjYIddKXGxdiI6EJSfAa7tSxFo"
        );

        // Modular: Función de inicio
        async function checkSession() {
            try {
                log("Verificando sesión...");
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('panel-section').classList.remove('hidden');
                    log("Sesión activa");
                } else {
                    log("Sin sesión. Esperando login.");
                }
            } catch (e) {
                log("Error auth: " + e.message);
            }
        }

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            log("Intentando login...");
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) log("Login Error: " + error.message);
            else window.location.reload();
        };

        document.getElementById('logout-btn').onclick = async () => {
            await supabase.auth.signOut();
            window.location.reload();
        };

        checkSession();
    </script>
</body>
</html>
