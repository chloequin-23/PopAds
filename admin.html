<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Otaku Nexus · Panel Privado</title>

  <!-- Tailwind CSS para el diseño -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- LOGIN -->
  <div id="admin-denegado" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50 px-4">
    <div class="glass p-8 rounded-2xl w-full max-w-sm shadow-2xl text-center">
      <h1 class="text-2xl font-bold text-pink-500 mb-6">Acceso Privado</h1>
      <form id="login-form" class="space-y-4">
        <input type="email" id="login-email" required placeholder="Correo" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-pink-500 outline-none">
        <input type="password" id="login-password" required placeholder="Contraseña" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-pink-500 outline-none">
        <button type="submit" id="btn-login" class="w-full bg-pink-600 hover:bg-pink-700 font-bold py-3 rounded-lg text-sm transition">Ingresar al Panel</button>
      </form>
    </div>
  </div>

  <!-- PANEL PRINCIPAL -->
  <div id="admin-panel-contenedor" class="hidden">
    <header class="glass p-4 flex justify-between items-center sticky top-0 z-40">
      <h1 class="text-lg font-bold">Panel <span class="text-pink-500">Admin</span></h1>
      <button id="btn-logout-admin" class="text-xs bg-gray-800 px-3 py-1 rounded-lg">Salir</button>
    </header>

    <nav class="flex overflow-x-auto p-4 gap-2 border-b border-gray-800">
      <button class="tab-btn px-4 py-2 rounded-lg text-xs font-bold bg-gray-800 active" data-tab="colores">🎨 Colores</button>
      <button class="tab-btn px-4 py-2 rounded-lg text-xs font-bold bg-gray-800" data-tab="medios">🖼️ Medios</button>
      <button class="tab-btn px-4 py-2 rounded-lg text-xs font-bold bg-gray-800" data-tab="quiz">❓ Quiz</button>
      <button class="tab-btn px-4 py-2 rounded-lg text-xs font-bold bg-gray-800" data-tab="comentarios">💬 Comentarios</button>
      <button class="tab-btn px-4 py-2 rounded-lg text-xs font-bold bg-gray-800" data-tab="sistema">⚙️ Sistema</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
      <section id="colores" class="admin-panel active glass p-6 rounded-xl"><h2>Módulo Colores</h2></section>
      <section id="medios" class="admin-panel glass p-6 rounded-xl"><h2>Módulo Medios</h2></section>
      <section id="quiz" class="admin-panel glass p-6 rounded-xl"><h2>Módulo Quiz</h2></section>
      <section id="comentarios" class="admin-panel glass p-6 rounded-xl"><h2>Módulo Comentarios</h2></section>
      <section id="sistema" class="admin-panel glass p-6 rounded-xl"><h2>Módulo Sistema</h2></section>
    </main>
  </div>

  <!-- Scripts -->
  <script>

    window.supabase = supabase.createClient(

    );
  </script>
  <script src="js/auth.js"></script>
  <script src="js/adminTabs.js"></script>
  <script src="js/adminActions.js"></script>
</body>
</html>
